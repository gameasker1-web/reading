<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Challenge Premium</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #7b2ff7; --text: #c9d1d9; --gold: #f1c40f; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; padding: 20px; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: white; font-size: 28px; margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #010409; border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        .hidden { display: none; }
        .leader-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #30363d; }
        .leader-item.me { background: rgba(123, 47, 247, 0.1); border-radius: 8px; border: 1px solid var(--accent); }
        .book-card { background: #010409; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--accent); }
        .badge { background: var(--accent); padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Reading Challenge</h1>

    <div id="auth-section" class="card">
        <h2 style="text-align: center; margin-top: 0;">Привет!</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="handleAuth('login')">Войти</button>
        <button onclick="handleAuth('register')" style="background: none; border: 1px solid var(--accent); margin-top: 10px;">Регистрация</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="card" style="text-align: center;">
            <h2 id="display-name" style="margin: 0;"></h2>
            <div style="font-size: 24px; color: var(--gold); margin: 10px 0;">
                <span id="display-points">0</span> <small>PTS</small>
            </div>
            <button onclick="logout()" style="width: auto; padding: 6px 16px; background: #30363d;">Выйти</button>
        </div>

        <div class="card">
            <h3>📝 Добавить книгу</h3>
            <input type="text" id="title" placeholder="Название книги">
            <input type="text" id="author" placeholder="Автор">
            <textarea id="review" rows="3" placeholder="Ваш отзыв..."></textarea>
            <button id="add-btn" onclick="addBook()">ОТПРАВИТЬ ИИ</button>
        </div>

        <div class="card">
            <h3>🏆 Лидеры</h3>
            <div id="leaderboard"></div>
        </div>

        <div class="card">
            <h3>📖 Моя полка</h3>
            <div id="my-books"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://reading-vohg.onrender.com/api";
    let user = JSON.parse(localStorage.getItem('reading_user'));

    if (user) showMain();

    async function handleAuth(type) {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if (!u || !p) return alert("Заполни поля!");

        try {
            const res = await fetch(`${API_URL}/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if (res.ok) {
                user = data;
                localStorage.setItem('reading_user', JSON.stringify(user));
                showMain();
            } else { alert(data.message); }
        } catch (e) {
            alert("Сервер просыпается... Подождите 30 секунд и нажмите еще раз.");
        }
    }

    function showMain() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        document.getElementById('display-name').innerText = user.username;
        document.getElementById('display-points').innerText = user.points;
        updateData();
    }

    async function addBook() {
        const btn = document.getElementById('add-btn');
        const title = document.getElementById('title').value;
        const author = document.getElementById('author').value;
        const review = document.getElementById('review').value;

        if (!title || !review) return alert("Нужно название и отзыв!");

        btn.disabled = true;
        btn.innerText = "ИИ ДУМАЕТ...";

        try {
            const res = await fetch(`${API_URL}/add_book`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: user.user_id, title, author, review})
            });
            const data = await res.json();
            alert(`Баллы за книгу: +${data.points_earned}`);
            user.points = data.new_total;
            localStorage.setItem('reading_user', JSON.stringify(user));
            document.getElementById('display-points').innerText = user.points;
            document.getElementById('title').value = '';
            document.getElementById('review').value = '';
            updateData();
        } catch (e) { alert("Ошибка сохранения"); }
        btn.disabled = false; btn.innerText = "ОТПРАВИТЬ ИИ";
    }

    async function updateData() {
        // Лидеры
        const lRes = await fetch(`${API_URL}/leaderboard`);
        const leaders = await lRes.json();
        document.getElementById('leaderboard').innerHTML = leaders.map((l, i) => `
            <div class="leader-item ${l.username === user.username ? 'me' : ''}">
                <span>${i+1}. ${l.username === user.username ? '🌍 ' : ''}${l.username}</span>
                <span style="color:var(--gold)">${l.points}</span>
            </div>
        `).join('');

        // Книги
        const bRes = await fetch(`${API_URL}/my_books/${user.user_id}`);
        const books = await bRes.json();
        document.getElementById('my-books').innerHTML = books.map(b => `
            <div class="book-card">
                <b>${b.title}</b> — ${b.author} <span class="badge">+${b.points}</span>
            </div>
        `).join('');
    }

    function logout() { localStorage.removeItem('reading_user'); location.reload(); }
</script>

</body>
</html>

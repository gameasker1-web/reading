<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Challenge Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --deep-purple: #1a0b2e;
            --accent-purple: #4a1d96;
            --white: #ffffff;
        }

        body {
            background-color: var(--deep-purple);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            height: 100vh;
        }

        .global-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, #2d1b4d 0%, #1a0b2e 100%);
            z-index: -1;
        }

        /* 3D КНИГА (ОТКРЫТАЯ) */
        .book-3d-open {
            width: 160px;
            height: 120px;
            position: relative;
            perspective: 1000px;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
        }
        .book-back-cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #311363;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transform: translateZ(-2px);
        }
        .book-page-left, .book-page-right {
            position: absolute;
            width: 48%;
            height: 90%;
            top: 5%;
            background: #fdfdfd;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }
        .book-page-left { left: 2%; border-radius: 4px 0 0 4px; border-right: 1px solid #ddd; }
        .book-page-right { right: 2%; border-radius: 0 4px 4px 0; border-left: 1px solid #ddd; }
        .scribbles { width: 100%; height: 4px; background: #e0e0e0; margin-bottom: 6px; border-radius: 2px; }
        .scribbles.short { width: 60%; } .scribbles.mid { width: 85%; }
        .flipping-leaf {
            position: absolute;
            width: 46%;
            height: 86%;
            top: 7%;
            background: #f0f0f0;
            left: 50%;
            transform-origin: left;
            animation: flipOpenBook 6s infinite ease-in-out;
            z-index: 10;
            border-left: 1px solid #ccc;
            box-shadow: -5px 0 10px rgba(0,0,0,0.1);
        }
        @keyframes flipOpenBook {
            0%, 20% { transform: rotateY(0deg); }
            50% { transform: rotateY(-170deg); }
            80%, 100% { transform: rotateY(0deg); }
        }

        /* ПЕРЕХОДЫ СТРАНИЦ */
        .page {
            position: absolute;
            width: 100%;
            min-height: 100vh;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
            padding-bottom: 120px;
        }
        .page-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .page-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .page-active { transform: translateX(0); opacity: 1; pointer-events: auto; position: relative; }

        #loader { transition: opacity 0.8s ease, visibility 0.8s; background: var(--deep-purple); z-index: 200; }
        .earth-container {
            width: 200px; height: 200px; border-radius: 50%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Earth_Western_Hemisphere_transparent_background.png/600px-Earth_Western_Hemisphere_transparent_background.png');
            background-size: cover; box-shadow: inset -20px -25px 50px rgba(0,0,0,0.9), 0 0 40px rgba(74, 29, 150, 0.4);
            transform: rotate(30deg); animation: rotateWorld 60s linear infinite;
        }
        @keyframes rotateWorld {
            50% { filter: brightness(1.2) saturate(1.3); }
        }

        .avatar-frame { width: 64px; height: 64px; border-radius: 50%; background: #2d1b4d; border: 3px solid white; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 10px; }
        .oval-element { border-radius: 9999px; }
        .soft-card { border-radius: 40px; }
        .nav-icon { fill: white; width: 28px; height: 28px; }
    </style>
</head>
<body>

    <div class="global-bg"></div>

    <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center invisible opacity-0">
        <div class="book-3d-open scale-125">
            <div class="book-back-cover"></div>
            <div class="book-page-left"><div class="scribbles mid"></div><div class="scribbles"></div><div class="scribbles short"></div></div>
            <div class="book-page-right"><div class="scribbles"></div><div class="scribbles short"></div><div class="scribbles mid"></div></div>
            <div class="flipping-leaf"></div>
        </div>
        <p class="mt-12 text-sm tracking-[0.4em] uppercase font-light opacity-70">Соединение с базой...</p>
    </div>

    <div id="app-container" class="relative overflow-hidden w-full">

        <section id="page-login" class="page page-active flex flex-col items-center justify-center">
            <div class="book-3d-open mb-16">
                <div class="book-back-cover"></div>
                <div class="book-page-left"><div class="scribbles mid"></div></div>
                <div class="book-page-right"><div class="scribbles short"></div></div>
                <div class="flipping-leaf"></div>
            </div>
            <div class="w-full max-w-[300px] space-y-4 px-4">
                <input type="text" id="loginUser" placeholder="Логин" class="w-full p-4 bg-white/5 border border-white/10 oval-element outline-none focus:border-white transition">
                <input type="password" id="loginPass" placeholder="Пароль" class="w-full p-4 bg-white/5 border border-white/10 oval-element outline-none focus:border-white transition">
                <button onclick="handleLogin()" class="w-full py-5 bg-white text-[#1a0b2e] font-black oval-element shadow-2xl active:scale-95 transition">ВОЙТИ</button>
            </div>
        </section>

        <section id="page-home" class="page page-right pt-24 px-6 max-w-xl mx-auto">
            <div class="bg-white/5 p-10 soft-card border border-white/10 mb-8 text-center backdrop-blur-md">
                <h1 class="text-3xl font-bold mb-4">Ридинг Челлендж</h1>
                <p class="text-gray-300 text-sm leading-relaxed">Твой личный дневник и ИИ-советник.</p>
            </div>
            <div class="bg-white/5 p-8 soft-card border border-white/10">
                <p class="mb-4 font-bold text-white">Рекомендации ИИ</p>
                <div id="aiChatBox" class="bg-black/40 rounded-[25px] h-32 p-5 mb-4 text-xs text-gray-400 overflow-y-auto leading-relaxed">
                    AI: Привет! Напиши мне жанр или настроение, и я подберу книги из Google Books.
                </div>
                <div class="flex gap-3">
                    <input type="text" id="aiInput" placeholder="Напиши ИИ..." class="flex-1 bg-white/5 oval-element px-5 py-3 border border-white/10 outline-none text-sm">
                    <button onclick="askAI()" class="bg-white text-black px-6 oval-element font-bold">↑</button>
                </div>
            </div>
        </section>

        <section id="page-rating" class="page page-right pt-24 px-6 max-w-xl mx-auto">
            <div class="flex items-end justify-center gap-4 mb-12 h-56">
                <div class="text-center">
                    <p class="text-[10px] mb-2 font-bold opacity-60">Ivan_Read</p>
                    <div class="avatar-frame border-gray-400 mx-auto">👤</div>
                    <div class="w-16 h-20 bg-gray-400 rounded-t-2xl flex items-center justify-center font-bold text-black mx-auto">2</div>
                </div>
                <div class="text-center">
                    <p class="text-xs mb-3 font-bold text-yellow-400">BookKing_77</p>
                    <div class="avatar-frame border-yellow-400 scale-125 mb-6 shadow-xl mx-auto">👑</div>
                    <div class="w-20 h-32 bg-yellow-500 rounded-t-2xl flex items-center justify-center font-bold text-black text-3xl mx-auto">1</div>
                </div>
                <div class="text-center">
                    <p class="text-[10px] mb-2 font-bold opacity-60">Svetlana_L</p>
                    <div class="avatar-frame border-amber-700 mx-auto">👤</div>
                    <div class="w-16 h-14 bg-amber-700 rounded-t-2xl flex items-center justify-center font-bold text-black mx-auto">3</div>
                </div>
            </div>
            <div class="flex justify-center mb-16"><div class="earth-container"></div></div>
        </section>

        <section id="page-profile" class="page page-right pt-24 px-6 max-w-xl mx-auto">
            <div class="bg-white/5 p-10 soft-card border border-white/10 text-center mb-8">
                <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-xl text-black">👤</div>
                <h2 id="profName" class="text-2xl font-black italic uppercase tracking-tight">Загрузка...</h2>
            </div>
        </section>

        <section id="page-add" class="page page-right pt-24 px-6 max-w-xl mx-auto">
            <h2 class="text-2xl font-bold mb-8 text-center uppercase tracking-widest">Добавить книгу</h2>
            <div class="space-y-5">
                <input type="text" id="bookTitle" placeholder="Название произведения" class="w-full p-5 bg-white/5 border border-white/10 oval-element outline-none focus:border-white transition">
                <input type="number" id="bookPages" placeholder="Количество страниц" class="w-full p-5 bg-white/5 border border-white/10 oval-element outline-none focus:border-white transition">
                <textarea id="bookReview" placeholder="Краткий отзыв..." class="w-full p-6 bg-white/5 border border-white/10 soft-card outline-none h-48 focus:border-white transition"></textarea>
                <button onclick="saveBook()" class="w-full py-5 bg-white text-black font-black oval-element shadow-2xl active:scale-95 transition">СОХРАНИТЬ В БАЗУ</button>
            </div>
        </section>

    </div>

    <nav id="bottom-nav" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-[#2d1b4d]/90 backdrop-blur-3xl border border-white/10 p-3 oval-element flex gap-2 shadow-2xl z-[100]">
        <button onclick="navigateTo('page-home')" class="p-4 px-6 rounded-full hover:bg-white/10 transition">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 4H3c-1.1 0-2 .9-2 2v13c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM3 19V6h8v13H3zm18 0h-8V6h8v13z"/></svg>
        </button>
        <button onclick="navigateTo('page-rating')" class="p-4 px-6 rounded-full hover:bg-white/10 transition">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 10.63 21 8.55 21 8V7c0-1.1-.9-2-2-2z"/></svg>
        </button>
        <button onclick="navigateTo('page-profile')" class="p-4 px-6 rounded-full hover:bg-white/10 transition">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </button>
        <button onclick="navigateTo('page-add')" class="p-4 px-6 rounded-full hover:bg-white/10 transition">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 4v2h6V4h2v16H7V4h2zm4 7h2v2h-2v2h-2v-2H9v-2h2V9h2v2z"/></svg>
        </button>
    </nav>

    <script>
        const API_URL = "https://reading-vohg.onrender.com";
        let activePageId = 'page-login';
        let currentUser = null;

        // 1. ЛОГИН С ПРОВЕРКОЙ
        async function handleLogin() {
            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;

            if (!username) return alert("Введите имя пользователя");

            const loader = document.getElementById('loader');
            loader.classList.remove('invisible');
            loader.style.opacity = "1";

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) throw new Error("Ошибка сервера");

                currentUser = await response.json();
                document.getElementById('profName').innerText = currentUser.username;

                setTimeout(() => {
                    loader.style.opacity = "0";
                    setTimeout(() => {
                        loader.classList.add('invisible');
                        navigateTo('page-home');
                    }, 800);
                }, 1000);
            } catch (e) {
                alert("Не удалось подключиться к Flask! Проверь, запущен ли app.py");
                loader.classList.add('invisible');
            }
        }

        // 2. ЧАТ С GEMINI
        async function askAI() {
            const prompt = document.getElementById('aiInput').value;
            const chatBox = document.getElementById('aiChatBox');
            if (!prompt) return;

            chatBox.innerText = "ИИ ищет книги в Google Books и анализирует...";
            
            try {
                const response = await fetch(`${API_URL}/recommend`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await response.json();
                chatBox.innerText = data.text;
            } catch (e) {
                chatBox.innerText = "Ошибка Gemini. Проверь консоль Flask.";
            }
        }

        // 3. СОХРАНЕНИЕ КНИГИ В POSTGRESQL
        async function saveBook() {
            const title = document.getElementById('bookTitle').value;
            const pages = document.getElementById('bookPages').value;
            const review = document.getElementById('bookReview').value;

            if (!title || pages <= 0) return alert("Заполни данные правильно");

            try {
                const response = await fetch(`${API_URL}/books`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser.id,
                        title: title,
                        pages: parseInt(pages),
                        review: review
                    })
                });

                if (response.ok) {
                    alert("Книга сохранена в PostgreSQL!");
                    navigateTo('page-profile');
                }
            } catch (e) {
                alert("Ошибка сохранения");
            }
        }

        // НАВИГАЦИЯ
        function navigateTo(targetId) {
            if (activePageId === targetId) return;
            const pages = ['page-login', 'page-home', 'page-rating', 'page-profile', 'page-add'];
            const targetIndex = pages.indexOf(targetId);

            pages.forEach((id) => {
                const el = document.getElementById(id);
                el.classList.remove('page-active', 'page-left', 'page-right');
                const elIndex = pages.indexOf(id);
                if (id === targetId) el.classList.add('page-active');
                else el.classList.add(elIndex < targetIndex ? 'page-left' : 'page-right');
            });

            activePageId = targetId;
            document.getElementById('bottom-nav').classList.toggle('hidden', targetId === 'page-login');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Challenge Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg: #0b0e14;
            --card: #151921;
            --accent: #7b2ff7;
            --secondary: #1c212d;
            --text: #ffffff;
            --gold: #fbc531;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            position: relative;
        }

        h1 { font-weight: 800; letter-spacing: -1px; text-align: center; margin-bottom: 5px; font-size: 2.2em; }
        .subtitle { text-align: center; opacity: 0.5; font-size: 0.7em; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }

        input, textarea {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 12px;
            border: 2px solid transparent;
            background: var(--secondary);
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); outline: none; background: #252b3a; }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(123, 47, 247, 0.4); }

        .hidden { display: none; }

        /* Таблица лидеров */
        .leader-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 8px;
            border-radius: 15px;
            border: 1px solid transparent;
        }

        .leader-item.me {
            border: 1px solid var(--gold);
            background: rgba(251, 197, 49, 0.1);
        }

        .rank { font-weight: 800; width: 35px; color: var(--accent); font-size: 1.1em; }
        .name { flex-grow: 1; font-weight: 600; }
        .score { font-weight: 800; color: var(--gold); }

        /* История книг */
        .book-item {
            padding: 15px;
            background: rgba(255,255,255,0.02);
            margin-bottom: 12px;
            border-radius: 15px;
            border-left: 4px solid var(--accent);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .book-title { font-weight: 700; display: block; margin-bottom: 4px; }
        .book-author { font-size: 0.85em; opacity: 0.6; }
        .pts-badge { float: right; background: var(--accent); font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 800; }

        .status-dot {
            width: 8px; height: 8px; background: #4caf50; border-radius: 50%; display: inline-block;
            margin-right: 5px; box-shadow: 0 0 10px #4caf50;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="subtitle"><span class="status-dot"></span> System Online • v3.0</div>
    <h1>READING<br><span style="color: var(--accent);">CHALLENGE</span></h1>

    <div id="auth-section" class="card">
        <h3 style="text-align: center; margin-top: 0;">Вход в систему</h3>
        <input type="text" id="username" placeholder="Имя профиля">
        <input type="password" id="password" placeholder="Секретный ключ">
        <button onclick="fakeAuth()">ВОЙТИ</button>
        <p style="text-align: center; font-size: 12px; opacity: 0.4; margin-top: 15px;">
            Регистрация проходит автоматически при первом входе
        </p>
    </div>

    <div id="main-section" class="hidden">
        
        <div class="card" style="display: flex; align-items: center; justify-content: space-between; background: linear-gradient(145deg, #151921, #1e2533);">
            <div>
                <h2 id="user-display" style="margin:0; font-weight: 800;">User</h2>
                <div style="color: var(--gold); font-weight: 800; font-size: 26px; margin-top: 5px;">
                    <span id="user-points">0</span> <small style="font-size: 12px; opacity: 0.7; letter-spacing: 1px;">PTS</small>
                </div>
            </div>
            <button onclick="logout()" style="width: auto; padding: 8px 15px; background: #222; font-size: 11px; letter-spacing: 1px;">ВЫХОД</button>
        </div>

        <div class="card">
            <h3 style="margin-top:0">📝 Добавить книгу</h3>
            <input type="text" id="book-title" placeholder="Название">
            <input type="text" id="book-author" placeholder="Автор">
            <textarea id="book-review" rows="3" placeholder="Твой честный отзыв для анализа ИИ..."></textarea>
            <button id="add-btn" onclick="addBook()">ОТПРАВИТЬ ИИ</button>
        </div>

        <div class="card">
            <h3 style="margin-top:0">🏆 Список лидеров</h3>
            <div id="leaderboard">
                </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0">📚 Ваша история</h3>
            <div id="book-list">
                <div style="text-align: center; opacity: 0.2; padding: 20px;">Здесь пока пусто...</div>
            </div>
        </div>
    </div>
</div>

<script>
    let user = JSON.parse(localStorage.getItem('reading_user'));
    let books = JSON.parse(localStorage.getItem('reading_books')) || [];

    if (user) showMain();

    function fakeAuth() {
        const u = document.getElementById('username').value;
        if (!u) return alert("Введите имя!");
        
        user = { username: u, points: parseInt(localStorage.getItem('pts_' + u)) || 0 };
        localStorage.setItem('reading_user', JSON.stringify(user));
        showMain();
    }

    function showMain() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        document.getElementById('user-display').innerText = user.username;
        document.getElementById('user-points').innerText = user.points;
        renderLeaderboard();
        renderBooks();
    }

    function addBook() {
        const t = document.getElementById('book-title').value;
        const a = document.getElementById('book-author').value;
        const r = document.getElementById('book-review').value;
        const btn = document.getElementById('add-btn');

        if (!t || !r) return alert("Заполни поля!");

        btn.disabled = true;
        btn.innerText = "ИИ АНАЛИЗИРУЕТ...";

        // Имитируем работу ИИ
        setTimeout(() => {
            const earned = Math.floor(Math.random() * (50 - 20 + 1)) + 20;
            const newBook = { title: t, author: a, points: earned };
            
            books.unshift(newBook);
            localStorage.setItem('reading_books', JSON.stringify(books));
            
            user.points += earned;
            localStorage.setItem('reading_user', JSON.stringify(user));
            localStorage.setItem('pts_' + user.username, user.points);
            
            document.getElementById('user-points').innerText = user.points;
            alert(`ИИ оценил отзыв! Начислено: ${earned} PTS`);
            
            document.getElementById('book-title').value = '';
            document.getElementById('book-author').value = '';
            document.getElementById('book-review').value = '';
            
            renderBooks();
            renderLeaderboard();
            
            btn.disabled = false;
            btn.innerText = "ОТПРАВИТЬ ИИ";
        }, 1500);
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboard');
        // Статичные боты для веса списка
        const leaders = [
            { name: "CyberReader", pts: 840 },
            { name: "BookMaster_99", pts: 620 },
            { name: "Elena_Star", pts: 410 }
        ];

        // Добавляем тебя
        leaders.push({ name: user.username, pts: user.points, isMe: true });
        leaders.sort((a, b) => b.pts - a.pts);

        container.innerHTML = leaders.map((l, i) => `
            <div class="leader-item ${l.isMe ? 'me' : ''}">
                <div class="rank">#${i + 1}</div>
                <div class="name">${l.isMe ? '🌍 ' : ''}${l.name}</div>
                <div class="score">${l.pts}</div>
            </div>
        `).join('');
    }

    function renderBooks() {
        const container = document.getElementById('book-list');
        if (books.length === 0) return;
        
        container.innerHTML = books.map(b => `
            <div class="book-item">
                <span class="pts-badge">+${b.points}</span>
                <span class="book-title">${b.title}</span>
                <span class="book-author">${b.author || 'Автор не указан'}</span>
            </div>
        `).join('');
    }

    function logout() {
        localStorage.removeItem('reading_user');
        location.reload();
    }
</script>

</body>
</html>

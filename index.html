<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Challenge Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg: #0b0e14;
            --card: #151921;
            --accent: #7b2ff7;
            --secondary: #1c212d;
            --text: #ffffff;
            --gold: #fbc531;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 480px; padding: 20px; }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        h1 { font-weight: 800; letter-spacing: -1px; text-align: center; margin-bottom: 5px; font-size: 2.2em; }
        .subtitle { text-align: center; opacity: 0.5; font-size: 0.7em; margin-bottom: 30px; letter-spacing: 2px; }

        input, textarea {
            width: 100%;
            padding: 16px; margin: 10px 0;
            border-radius: 12px; border: 2px solid transparent;
            background: var(--secondary); color: white;
            box-sizing: border-box; font-size: 15px; transition: 0.3s;
        }

        input:focus { border-color: var(--accent); outline: none; background: #252b3a; }

        button {
            width: 100%; padding: 16px;
            background: var(--accent); border: none; border-radius: 12px;
            color: white; font-weight: 700; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(123, 47, 247, 0.4); }

        .hidden { display: none; }

        /* Лидерборд */
        .leader-item {
            display: flex; align-items: center; padding: 15px;
            background: rgba(255,255,255,0.03); margin-bottom: 8px;
            border-radius: 15px; border: 1px solid transparent;
        }

        .leader-item.me { border: 1px solid var(--gold); background: rgba(251, 197, 49, 0.1); }
        .rank { font-weight: 800; width: 35px; color: var(--accent); }
        .name { flex-grow: 1; font-weight: 600; }
        .score { font-weight: 800; color: var(--gold); }

        /* Книги */
        .book-item {
            padding: 15px; background: rgba(255,255,255,0.02);
            margin-bottom: 12px; border-radius: 15px; border-left: 4px solid var(--accent);
        }
        .book-title { font-weight: 700; display: block; }
        .pts-badge { float: right; background: var(--accent); font-size: 10px; padding: 3px 8px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="subtitle">PREMIUM INTERFACE • SYSTEM ACTIVE</div>
    <h1>READING<br><span style="color: var(--accent);">CHALLENGE</span></h1>

    <div id="auth-section" class="card">
        <h3 style="text-align: center; margin-top: 0;">Авторизация</h3>
        <input type="text" id="username" placeholder="Имя профиля">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="handleAuth('login')">ВОЙТИ</button>
        <button onclick="handleAuth('register')" style="background: none; color: #666; font-size: 0.9em;">УСЛОВНАЯ РЕГИСТРАЦИЯ</button>
    </div>

    <div id="main-section" class="hidden">
        
        <div class="card" style="display: flex; align-items: center; justify-content: space-between;">
            <div>
                <h2 id="user-display" style="margin:0; font-weight: 800;">User</h2>
                <div style="color: var(--gold); font-weight: 800; font-size: 24px; margin-top: 5px;">
                    <span id="user-points">0</span> <small style="font-size: 12px; opacity: 0.7;">PTS</small>
                </div>
            </div>
            <button onclick="logout()" style="width: auto; padding: 8px 15px; background: #222; font-size: 12px;">Выйти</button>
        </div>

        <div class="card">
            <h3 style="margin-top:0">📖 Новая книга</h3>
            <input type="text" id="book-title" placeholder="Название">
            <input type="text" id="book-author" placeholder="Автор">
            <textarea id="book-review" rows="3" placeholder="Ваш отзыв для ИИ..."></textarea>
            <button id="add-btn" onclick="addBook()">ОТПРАВИТЬ НА АНАЛИЗ ИИ</button>
        </div>

        <div class="card">
            <h3 style="margin-top:0">🏆 Список лидеров</h3>
            <div id="leaderboard">
                </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0">📚 Ваша история</h3>
            <div id="book-list">
                <div style="text-align: center; opacity: 0.3; padding: 20px;">Пока нет записей</div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://reading-vohg.onrender.com/api";
    let user = JSON.parse(localStorage.getItem('reading_user'));
    let localBooks = JSON.parse(localStorage.getItem('reading_books')) || [];

    if (user) showMain();

    async function handleAuth(type) {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if (!u) return alert("Введите имя!");

        if (type === 'register') {
            // РЕГИСТРАЦИЯ ТЕПЕРЬ ПРОСТО ПУСКАЕТ ВНУТРЬ БЕЗ БД
            user = { user_id: Date.now(), username: u, points: 0, is_local: true };
            localStorage.setItem('reading_user', JSON.stringify(user));
            showMain();
            return;
        }

        // Логин всё еще пытается подключиться к БД, если сервер жив
        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if (res.ok) {
                user = { user_id: data.user_id, username: data.username, points: data.points || 0 };
                localStorage.setItem('reading_user', JSON.stringify(user));
                showMain();
            } else { alert("Ошибка входа. Попробуйте 'Условную регистрацию'"); }
        } catch (e) {
            alert("Сервер Render недоступен. Используйте кнопку регистрации для входа.");
        }
    }

    function showMain() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        document.getElementById('user-display').innerText = user.username;
        document.getElementById('user-points').innerText = user.points;
        renderLeaderboard();
        renderBooks();
    }

    async function addBook() {
        const btn = document.getElementById('add-btn');
        const title = document.getElementById('book-title').value;
        const author = document.getElementById('book-author').value;
        const review = document.getElementById('book-review').value;

        if (!title || !review) return alert("Заполните поля!");

        btn.disabled = true; btn.innerText = "ИИ ОЦЕНИВАЕТ...";

        let pointsEarned = Math.floor(Math.random() * (50 - 15 + 1)) + 15; // Локальный расчет, если ИИ недоступен

        try {
            const res = await fetch(`${API_URL}/add_book`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: user.user_id, title, author, review})
            });
            const data = await res.json();
            if (res.ok) pointsEarned = data.points_earned;
        } catch (e) { console.log("Работаем в автономном режиме"); }

        // Сохраняем книгу локально
        const newBook = { title, author, points: pointsEarned };
        localBooks.unshift(newBook);
        localStorage.setItem('reading_books', JSON.stringify(localBooks));

        // Обновляем баллы пользователя
        user.points += pointsEarned;
        localStorage.setItem('reading_user', JSON.stringify(user));
        document.getElementById('user-points').innerText = user.points;

        alert(`ИИ проанализировал отзыв! Начислено: ${pointsEarned} PTS`);
        
        document.getElementById('book-title').value = '';
        document.getElementById('book-review').value = '';
        
        renderBooks();
        renderLeaderboard();
        btn.disabled = false; btn.innerText = "ОТПРАВИТЬ НА АНАЛИЗ ИИ";
    }

    function renderLeaderboard() {
        const lContainer = document.getElementById('leaderboard');
        // Статичные лидеры + Ты с Планетой Земля
        const mockLeaders = [
            { username: "Alex_Read", points: 450 },
            { username: "BookWorm", points: 380 },
            { username: "Elena_K", points: 310 }
        ];

        // Добавляем тебя в список
        mockLeaders.push({ username: user.username, points: user.points, isMe: true });
        mockLeaders.sort((a, b) => b.points - a.points);

        lContainer.innerHTML = mockLeaders.map((l, index) => `
            <div class="leader-item ${l.isMe ? 'me' : ''}">
                <div class="rank">#${index + 1}</div>
                <div class="name">${l.isMe ? '🌍 ' : ''}${l.username}</div>
                <div class="score">${l.points}</div>
            </div>
        `).join('');
    }

    function renderBooks() {
        const bContainer = document.getElementById('book-list');
        if (localBooks.length === 0) return;
        
        bContainer.innerHTML = localBooks.map(b => `
            <div class="book-item">
                <span class="pts-badge">+${b.points}</span>
                <span class="book-title">${b.title}</span>
                <span style="opacity:0.5; font-size: 0.8em;">${b.author || 'Автор не указан'}</span>
            </div>
        `).join('');
    }

    function logout() {
        localStorage.removeItem('reading_user');
        location.reload();
    }
</script>

</body>
</html>
